<script type="module" defer>
  onload = () => {
    const React = platform.getService('React');
    const ReactDOM = platform.getService('ReactDOM');
    const props = platform.getService('props');

    // console.log(props, React, ReactDOM);

    props.toggleHeader(false);

    const dom = document.getElementById('react-root');
    const root = ReactDOM.createRoot(dom);
    const appModuleSource = document.querySelector('script[type="text/React-Jsx"]').innerText;

    const {App} = platform.host.execString(appModuleSource);
    root.render(React.createElement(App, props, []));



    // document.getElementById('render-btn').addEventListener('click', () => {
    //   props.close();
    // });

    // const dragger = document.getElementById('dragger');
    const dragger = dom

    let isDragging = false;
    let startX, startY, startRect;

    const onDragStart = (event) => {
      isDragging = true;
      startRect = props.getBoundingClientRect();
      startX = event.clientX;
      startY = event.clientY;
      if(event.target.localName === 'section') event.preventDefault(); // Prevent default dragging behavior
    };

    const onDrag = (event) => {
      if (!isDragging) return;

      const deltaX = event.clientX - startX;
      const deltaY = event.clientY - startY;

      const newRect = {
        left: startRect.left + deltaX,
        top: startRect.top + deltaY,
        right: startRect.right + deltaX,
        bottom: startRect.bottom + deltaY
      };

      props.setBoundingClientRect(newRect);
    };

    const onDragEnd = () => {
      isDragging = false;
    };

    dragger.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', onDragEnd);

    // Function to center the iframe
    const centerIframe = () => {
      const currentRect = props.getBoundingClientRect();
      const iframeWidth = currentRect.right - currentRect.left;
      const iframeHeight = currentRect.bottom - currentRect.top;

      // Parent dimensions based on iframe size and offsets, using props.host dimensions
      const parentWidth = iframeWidth + currentRect.left + (props.host.innerWidth - currentRect.right);
      const parentHeight = iframeHeight + currentRect.top + (props.host.innerHeight - currentRect.bottom);

      // Calculate new centered position
      const newRect = {
        left: (parentWidth - iframeWidth) / 2,
        top: (parentHeight - iframeHeight) / 2,
        right: (parentWidth + iframeWidth) / 2,
        bottom: (parentHeight + iframeHeight) / 2
      };

      props.setBoundingClientRect(newRect);
    };

    const centerAndResize = () => {
      // Calculate new centered position
      const newRect = {
        left: '15%',
        top: '5%',
        height: '90%',
        width: '70%',
        borderRadius: '1.5rem'
      };

      props.setBoundingClientRect(newRect);
    };

    centerAndResize()
  };

</script>
<script type="text/React-Jsx">

    '.png': 'image/png',
    '.jpg': 'image/jpeg',
    '.jpeg': 'image/jpeg',
    '.gif': 'image/gif',
    '.webp': 'image/webp',
    '.svg': 'image/svg+xml',

  // Generic image-thumbnail hook: reads each image-extension file in `entries`
  // from the virtual fs and exposes path -> blob URL. Mirrors the approach in
  // the file explorer (`/(sw)/...` subresource fetches aren't intercepted from
  // uncontrolled `about:blank` iframes, so thumbnails are built from blob URLs
  // read directly via `platform.host.getFS()`).
  const useThumbnails = (entries, getPath, getExtOf) => {
    const [thumbnails, setThumbnails] = React.useState({})
    const key = entries.map(getPath).join(' ')
    React.useEffect(() => {
      const urls = []
      const next = {}
      entries.forEach(entry => {
        const ext = getExtOf(entry)
        if (!imageExtensions.has(ext)) return
        try {
          const data = fs.readFileSync(getPath(entry))
          const blob = new Blob([data], {type: imageMimeTypes[ext] || 'application/octet-stream'})
          const url = URL.createObjectURL(blob)
          next[getPath(entry)] = url
          urls.push(url)
        } catch (err) {}
      })
      setThumbnails(next)
      return () => urls.forEach(url => URL.revokeObjectURL(url))
    }, [key])
    return thumbnails
  }

  // Generic file picker modal: browses the virtual fs starting at `initialDir`,
  // optionally restricting selectable files to `accept` (a Set of lowercase
  // extensions, e.g. imageExtensions). Calls `onSelect(path)` then `onClose()`.
  const FilePicker = ({ initialDir, accept, title, onSelect, onClose }) => {
    const [dir, setDir] = React.useState(initialDir || '/home/user1')
    const [selected, setSelected] = React.useState(null)

    const readDir = (d) => {
      try {
        return fs.readdirSync(d)
          .map(name => {
            const path = d === '/' ? `/${name}` : `${d}/${name}`
            let isDir = false
            try { isDir = fs.statSync(path).isDirectory() } catch (err) {}
            return { name, path, isDir, ext: getExt(name) }
          })
          .sort((a, b) => (a.isDir === b.isDir) ? a.name.localeCompare(b.name) : (a.isDir ? -1 : 1))
      } catch (err) {
        return []
      }
    }

    const [entries, setEntries] = React.useState(() => readDir(dir))

    React.useEffect(() => {
      setEntries(readDir(dir))
      setSelected(null)
    }, [dir])

    const thumbnails = useThumbnails(entries.filter(e => !e.isDir), e => e.path, e => e.ext)

    const breadcrumbs = React.useMemo(() => {
      const parts = dir.split('/').filter(Boolean)
      const crumbs = [{ name: 'Root', path: '/' }]
      let acc = ''
      parts.forEach(p => { acc += `/${p}`; crumbs.push({ name: p, path: acc }) })
      return crumbs
    }, [dir])

    const visibleEntries = entries.filter(e => e.isDir || !accept || accept.has(e.ext))

    const choose = (path) => {
      onSelect(path)
      onClose()
    }

    return (
      <div className="filepicker-overlay" onClick={onClose}>
        <div className="filepicker-dialog" onClick={e => e.stopPropagation()}>
          <div className="filepicker-header">
            <span>{title || 'Choose a file'}</span>
            <span className="filepicker-close material-symbols-outlined" onClick={onClose}>close</span>
          </div>
          <div className="filepicker-breadcrumbs">
            {breadcrumbs.map((c, i) => (
              <React.Fragment key={c.path}>
                {i > 0 && <span className="material-symbols-outlined sep">chevron_right</span>}
                <span className="crumb" onClick={() => setDir(c.path)}>{c.name}</span>
              </React.Fragment>
            ))}
          </div>
          <div className="filepicker-grid">
            {visibleEntries.length === 0 && (
              <div className="filepicker-empty">This folder is empty.</div>
            )}
            {visibleEntries.map(entry => (
              <div
                key={entry.path}
                className={`filepicker-item ${selected === entry.path ? 'selected' : ''}`}
                onClick={() => !entry.isDir && setSelected(entry.path)}
                onDoubleClick={() => entry.isDir ? setDir(entry.path) : choose(entry.path)}
                title={entry.name}
              >
                <div
                  className="filepicker-icon"
                  style={thumbnails[entry.path] ? { backgroundImage: `url('${thumbnails[entry.path]}')` } : undefined}
                >
                  {!thumbnails[entry.path] && (
                    <span className="material-symbols-outlined">{entry.isDir ? 'folder' : 'draft'}</span>
                  )}
                </div>
                <span className="filepicker-name">{entry.name}</span>
              </div>
            ))}
          </div>
          <div className="filepicker-footer">
            <button className="settings-btn" onClick={onClose}>Cancel</button>
            <button className="settings-btn primary" disabled={!selected} onClick={() => choose(selected)}>Choose</button>
          </div>
        </div>
      </div>
    )
  }


  const Projects = () => {
    const projectsDir = '/home/user1/projects'
    const [ls] = React.useState(() => fs.readdirSync(projectsDir).map(name => {

      try { isDir = fs.statSync(path).isDirectory() } catch (err) {}

    const projectIconMap = {
      '.html': '/public/html-icon.png',
      '.js': '/public/js-icon.png',

      platform.host.execCommand(cmd, platform);
    }

    return (
      <div className="settings-page">
        <h1 className="settings-page-title">Projects</h1>
        <div className="projects-grid">
          {ls.map(file => (
            <div key={file.path} className="project-card" onClick={() => openProject(file.name)}>
              <img className="project-icon" src={`${origin}${projectIconMap[file.isDir ? '' : file.ext] ?? '/public/invalid-file-icon.png'}`} alt="" />
              <span className="project-name">{file.name}</span>

  const Contact = () => {
    const [copied, setCopied] = React.useState(false)

    const copyEmail = () => {
      platform.window.navigator.clipboard?.writeText(contactInfo.email || '')
      setCopied(true)
      setTimeout(() => setCopied(false), 1500)
    }

    const links = [
      { key: 'email', label: 'Email', value: contactInfo.email, href: contactInfo.email ? `mailto:${contactInfo.email}` : null, icon: 'mail', color: '#34c759', action: contactInfo.email ? { label: copied ? 'Copied!' : 'Copy', onClick: copyEmail } : null },
      { key: 'github', label: 'GitHub', value: contactInfo.github, href: contactInfo.github, icon: 'code', color: '#1f2328' },
      { key: 'linkedin', label: 'LinkedIn', value: contactInfo.linkedin, href: contactInfo.linkedin, icon: 'work', color: '#0a66c2' },
      { key: 'website', label: 'Website', value: contactInfo.website, href: contactInfo.website, icon: 'language', color: '#0a84ff' },

    return (

        <h1 className="settings-page-title">Contact</h1>
        <div className="settings-group">
          <div className="settings-group-body">
            {links.length === 0 && (
              <div className="settings-row">
                <span className="settings-row-label">No contact info set yet.</span>
              </div>
            )}
            {links.map(link => (
              <div key={link.key} className="settings-row">
                <span className="settings-row-icon material-symbols-outlined" style={{background: link.color}}>{link.icon}</span>
                <div className="settings-row-text">
                  <div className="settings-row-title">{link.label}</div>
                  {link.href ? (
                    <a className="settings-row-subtitle" href={link.href} target="_blank" rel="noreferrer">{link.value}</a>
                  ) : (
                    <div className="settings-row-subtitle">{link.value}</div>
                  )}
                </div>
                {link.action && (
                  <button className="settings-btn" onClick={link.action.onClick}>{link.action.label}</button>
                )}
              </div>
            ))}
          </div>
        </div>
        <p className="settings-hint">
          Edit the <code>contact</code> object in <code>/user-preferences.json</code> to add or change email, GitHub and website links.
        </p>
      </div>
    )
  }

  const Layout = () => {
    const readLayouts = () => {
      try {
        return JSON.parse(fs.readFileSync('/etc/wm/layouts.json', 'utf-8')).layouts ?? []
      } catch (err) {
        return []
      }
    }

    const readCurrentLayout = () => {
      try {
        return JSON.parse(fs.readFileSync('/etc/wm/config.json', 'utf-8')).layout ?? 'default'
      } catch (err) {
        return 'default'
      }
    }

    const [layouts] = React.useState(readLayouts);
    const [currentLayout, setCurrentLayout] = React.useState(readCurrentLayout);

    const onSelectLayout = (layoutId) => {
      setCurrentLayout(layoutId);
      platform.host.callCommand('set-layout', layoutId);
    };

    return (
      <div className="settings-page">
        <h1 className="settings-page-title">Layout</h1>
        <p className="settings-page-subtitle">Choose how the desktop, taskbar and windows are arranged.</p>
        <div className="settings-group">
          <div className="settings-group-body">
            {layouts.map(layout => (
              <div key={layout.id} className="settings-row" style={{cursor: 'pointer'}} onClick={() => onSelectLayout(layout.id)}>
                <div className="settings-row-text">
                  <div className="settings-row-title">{layout.name}</div>
                </div>
                {layout.id === currentLayout && <span className="material-symbols-outlined" style={{color: '#0a84ff'}}>check</span>}
              </div>
            ))}
          </div>
        </div>
        <p className="settings-hint">
          Layouts are stored in <code>/etc/wm/layouts.json</code> and the active layout in <code>/etc/wm/config.json</code> — edit these files directly to customize or add new layouts.
        </p>
      </div>
    )
  }

  const WM_SETTINGS_PATH = '/etc/wm/current.json'
  const WM_THEMES_DIR = '/etc/wm/themes'

  const DEFAULT_WM_SETTINGS = {
    appearance: {
      headerBackground: '#000000',
      headerColor: '#ffffff',
      windowBackground: 'rgba(255, 255, 255, 0.15)',
      taskbarBackground: 'rgba(0, 0, 0, 0.5)',
      taskbarSize: 56,
      accentColor: '#0a84ff',
      borderRadius: 6,
      blur: 10,
      shadow: true,
    },
    behavior: {
      dblClickHeaderFullscreen: true,
      bringToFrontOnClick: true,
    },
  }

  // Parses '#rrggbb[aa]' or 'rgb(a)(...)' CSS colors into {r, g, b, a}.
  const parseCssColor = (str) => {
    str = (str || '').trim()
    if (str.startsWith('#')) {
      let hex = str.slice(1)
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('')
      const r = parseInt(hex.slice(0, 2), 16) || 0
      const g = parseInt(hex.slice(2, 4), 16) || 0
      const b = parseInt(hex.slice(4, 6), 16) || 0
      const a = hex.length >= 8 ? parseInt(hex.slice(6, 8), 16) / 255 : 1
      return { r, g, b, a }
    }
    const m = str.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*(?:,\s*([\d.]+)\s*)?\)/)
    if (m) return { r: +m[1], g: +m[2], b: +m[3], a: m[4] !== undefined ? +m[4] : 1 }
    return { r: 0, g: 0, b: 0, a: 1 }
  }

  const rgbToHex = (r, g, b) => '#' + [r, g, b].map(x => Math.round(x).toString(16).padStart(2, '0')).join('')

  // Color + opacity picker that reads/writes an 'rgba(r, g, b, a)' CSS color string.
  const ColorAlphaInput = ({ value, onChange }) => {
    const { r, g, b, a } = parseCssColor(value)
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
        <input type="color" value={rgbToHex(r, g, b)} onChange={e => {
          const next = parseCssColor(e.target.value)
          onChange(`rgba(${next.r}, ${next.g}, ${next.b}, ${a})`)
        }} />
        <input type="range" min="0" max="1" step="0.01" value={a} title="Opacity"
          onChange={e => onChange(`rgba(${r}, ${g}, ${b}, ${e.target.value})`)}
          style={{ width: '5rem' }} />
        <span style={{ fontSize: '0.75rem', color: '#666', width: '2.5rem', textAlign: 'right' }}>{Math.round(a * 100)}%</span>
      </div>
    )
  }

  const WindowManagerSettings = () => {
    const readWmSettings = () => {
      try {
        const raw = JSON.parse(fs.readFileSync(WM_SETTINGS_PATH, 'utf-8'))
        return {
          appearance: { ...DEFAULT_WM_SETTINGS.appearance, ...raw.appearance },
          behavior: { ...DEFAULT_WM_SETTINGS.behavior, ...raw.behavior },
        }
      } catch (err) {
        return DEFAULT_WM_SETTINGS
      }
    }

    const readThemes = () => {
      try {
        if (!fs.existsSync(WM_THEMES_DIR)) return []
        return fs.readdirSync(WM_THEMES_DIR)
          .filter(f => f.endsWith('.json'))
          .map(file => {
            const id = file.replace(/\.json$/, '')
            let raw = {}
            try { raw = JSON.parse(fs.readFileSync(`${WM_THEMES_DIR}/${file}`, 'utf-8')) } catch (err) {}
            return {
              id,
              name: raw.name || id,
              appearance: { ...DEFAULT_WM_SETTINGS.appearance, ...raw.appearance },
            }
          })
      } catch (err) {
        return []
      }
    }

    const [settings, setSettings] = React.useState(readWmSettings)
    const [themes] = React.useState(readThemes)
    const [currentThemeId, setCurrentThemeId] = React.useState(() => {
      try {
        return JSON.parse(fs.readFileSync(WM_SETTINGS_PATH, 'utf-8')).name?.toLowerCase()
      } catch (err) {
        return undefined
      }
    })

    const persist = (next) => {
      setSettings(next)
      setCurrentThemeId(undefined)
      if (!fs.existsSync('/etc/wm')) fs.mkdirSync('/etc/wm', { recursive: true })
      fs.writeFileSync(WM_SETTINGS_PATH, JSON.stringify(next, null, 2))
      platform.host.callCommand('set-window-manager-settings', next)
    }

    const selectTheme = (theme) => {
      platform.host.callCommand('set-window-manager-theme', theme.id)
      setCurrentThemeId(theme.id)
      setSettings(readWmSettings())
    }

    const setAppearance = (key, value) => {
      persist({ ...settings, appearance: { ...settings.appearance, [key]: value } })
    }

    const setBehavior = (key, value) => {
      persist({ ...settings, behavior: { ...settings.behavior, [key]: value } })
    }

    const resetToDefaults = () => persist(DEFAULT_WM_SETTINGS)

    const themeCardStyle = (active) => ({
      display: 'flex',
      alignItems: 'center',
      gap: '0.75rem',
      padding: '0.6rem 0.8rem',
      margin: '0.4rem 0',
      border: active ? '2px solid #0a84ff' : '1px solid #e5e5ea',
      borderRadius: '10px',
      cursor: 'pointer',
      background: active ? '#eaf2ff' : 'white',
    })

    const swatchStyle = (appearance) => ({
      width: '2.5rem',
      height: '1.6rem',
      borderRadius: `${Math.min(appearance.borderRadius, 8)}px`,
      background: appearance.windowBackground,
      border: `2px solid ${appearance.headerBackground}`,
      outline: `2px solid ${appearance.accentColor}`,
      flexShrink: 0,
    })

    return (
      <div className="settings-page">
        <h1 className="settings-page-title">Window Manager</h1>
        <p className="settings-page-subtitle">Customize the appearance and behavior of application windows.</p>

        <h3 className="settings-section-title">Themes</h3>
        <div className="settings-group">
          <div className="settings-group-body" style={{padding: '0.6rem 0.8rem', display: 'block'}}>
            {themes.map(theme => (
              <div key={theme.id} style={themeCardStyle(theme.id === currentThemeId)} onClick={() => selectTheme(theme)}>
                <div style={swatchStyle(theme.appearance)} />
                <strong>{theme.name}</strong>
                {theme.id === currentThemeId ? <span style={{marginLeft: 'auto', color: '#0a84ff'}}>(active)</span> : null}
              </div>
            ))}
          </div>
        </div>

        <h3 className="settings-section-title">Appearance</h3>
        <div className="settings-group">
          <div className="settings-group-body">
            <div className="settings-row">
              <span className="settings-row-label">Title bar background</span>
              <input type="color" value={settings.appearance.headerBackground} onChange={e => setAppearance('headerBackground', e.target.value)} />
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Title bar text color</span>

            </div>
            <div className="settings-row">
              <span className="settings-row-label">Taskbar background</span>
              <ColorAlphaInput value={settings.appearance.taskbarBackground} onChange={v => setAppearance('taskbarBackground', v)} />

            <div className="settings-row">
              <span className="settings-row-label">Taskbar size ({settings.appearance.taskbarSize}px)</span>

              <span className="settings-row-label">Double-click title bar to toggle fullscreen</span>
              <input type="checkbox" checked={settings.behavior.dblClickHeaderFullscreen} onChange={e => setBehavior('dblClickHeaderFullscreen', e.target.checked)} />
            </div>

              <span className="settings-row-label">Bring window to front on click</span>
              <input type="checkbox" checked={settings.behavior.bringToFrontOnClick} onChange={e => setBehavior('bringToFrontOnClick', e.target.checked)} />

          <code>/etc/wm/current.json</code>, which applies to windows immediately. Themes are stored as
          individual files in <code>/etc/wm/themes/</code> &mdash; add your own JSON files there to make
          them available here. For deeper customization (e.g. new window behaviors), edit{' '}
          <code>/opt/window-manager.js</code> in the file explorer &mdash; it is re-loaded every time a
          window is opened.

      </div>

  // Keep in sync with FS_BACKEND_STORAGE_KEY / FS_BACKEND_QUERY_PARAM in src/index.ts.
  const FS_BACKEND_STORAGE_KEY = '__app_fs_backend__'
  const FS_BACKEND_QUERY_PARAM = 'fsBackend'

  const FS_BACKEND_OPTIONS = [
    { id: 'indexeddb', label: 'IndexedDB', desc: 'Default. Large storage quota (GB-scale) — used for the full filesystem and mounted local folders.' },
    { id: 'localstorage', label: 'LocalStorage', desc: 'Small quota (~5-10MB). Switch to this to access files saved by older versions of this app that stored data in localStorage.' },
  ]

  const StorageSettings = () => {
    const active = localStorage.getItem(FS_BACKEND_STORAGE_KEY) || 'indexeddb'
    const [selected, setSelected] = React.useState(active)

    const apply = () => {
      localStorage.setItem(FS_BACKEND_STORAGE_KEY, selected)
      const top = platform.window.top
      const url = new URL(top.location.href)
      url.searchParams.set(FS_BACKEND_QUERY_PARAM, selected)
      top.location.href = url.toString()
    }

    return (
      <div className="settings-page">
        <h1 className="settings-page-title">Storage</h1>
        <p className="settings-page-subtitle">Choose where the virtual filesystem is persisted. Switching reloads the desktop.</p>

        <div className="settings-group">
          <div className="settings-group-body" style={{padding: '0.6rem 0.8rem', display: 'block'}}>
            {FS_BACKEND_OPTIONS.map(opt => (
              <label key={opt.id} style={{display: 'flex', alignItems: 'flex-start', gap: '0.6rem', padding: '0.5rem 0', cursor: 'pointer'}}>
                <input type="radio" name="fs-backend" checked={selected === opt.id} onChange={() => setSelected(opt.id)} style={{marginTop: '0.2rem'}} />
                <span>
                  <strong>{opt.label}</strong>
                  {opt.id === active ? <span style={{marginLeft: '0.5rem', color: '#0a84ff'}}>(active)</span> : null}
                  <div style={{fontSize: '0.8rem', color: '#666'}}>{opt.desc}</div>
                </span>
              </label>
            ))}
          </div>
        </div>

        <div style={{marginTop: '1rem'}}>
          <button className="settings-btn" onClick={apply} disabled={selected === active}>Switch &amp; Reload</button>
        </div>

        <p className="settings-hint">
          The active backend is stored under the <code>{FS_BACKEND_STORAGE_KEY}</code> key in this browser's
          localStorage, and can be overridden by adding <code>?{FS_BACKEND_QUERY_PARAM}=indexeddb</code> or{' '}
          <code>?{FS_BACKEND_QUERY_PARAM}=localstorage</code> to the page URL. Each backend keeps its own
          separate copy of the filesystem &mdash; switching does not move or merge files between them.
        </p>
      </div>
    )
  }

  const Wallpapers = () => {
    const [inputValue, setInputValue] = React.useState('');
    const [wallpapers, setWallpapers] = React.useState(configWallpapers);
    const [showPicker, setShowPicker] = React.useState(false);
    const [activeWallpaper, setActiveWallpaper] = React.useState(() => platform.userPref.getWallpaper());
    const [contextMenu, setContextMenu] = React.useState(null);

    React.useEffect(() => {
      const metaFileRawContent = fs.readFileSync('/user-preferences.json')
      const configWallpapers = JSON.parse(metaFileRawContent).wallpapers ?? []
      setWallpapers(configWallpapers)
    }, [])

    React.useEffect(() => {
      if (!contextMenu) return;
      const close = () => setContextMenu(null);
      document.addEventListener('click', close);
      document.addEventListener('contextmenu', close);
      return () => {
        document.removeEventListener('click', close);
        document.removeEventListener('contextmenu', close);
      };
    }, [contextMenu]);

    const toFullUrl = (wallpaper) => wallpaper.startsWith('/') ? `${origin}${wallpaper}` : wallpaper;

    const addAndSet = (wallpaper) => {
      const fullUrl = toFullUrl(wallpaper);
      if (!wallpapers.includes(wallpaper)) {
        setWallpapers(state => [...state, wallpaper]);
        platform.host.callCommand('add-wallpaper', wallpaper);
      }
      platform.host.callCommand('set-wallpaper', fullUrl);
      setActiveWallpaper(fullUrl);
    };

    const onClickHandler = (wallpaper) => {
      addAndSet(wallpaper);
    };

    const onContextMenuHandler = (event, wallpaper) => {
      event.preventDefault();
      setContextMenu({ x: event.clientX, y: event.clientY, wallpaper });
    };

    const onDeleteWallpaper = (wallpaper) => {
      setContextMenu(null);
      setWallpapers(state => state.filter(w => w !== wallpaper));
      platform.host.callCommand('remove-wallpaper', wallpaper);
      setActiveWallpaper(platform.userPref.getWallpaper());

      // If the wallpaper points at a file in the virtual fs (uploaded via "Choose
      // from Files"), delete the underlying file too. Wallpapers referencing
      // bundled `/public/...` assets or remote URLs are only removed from the list.
      const swMarker = '/(sw)/';
      const swIdx = wallpaper.indexOf(swMarker);
      if (swIdx !== -1) {
        const path = wallpaper.slice(swIdx + swMarker.length - 1);
        try {
          if (fs.existsSync(path)) fs.unlinkSync(path);
        } catch (err) {
          console.error('Failed to delete wallpaper file', path, err);
        }
      }
    };

    const onFetchClick = () => {
      if (inputValue && !wallpapers.includes(inputValue)) {
        setWallpapers(state => [...state, inputValue]);
        platform.host.callCommand('add-wallpaper', inputValue);
        setInputValue('')
      }
    };

    const onPickFromFiles = (path) => {
      addAndSet(`/(sw)${path}`);
    };

    return (
      <div className="settings-page">
        <h1 className="settings-page-title">Wallpaper</h1>
        <div className="wallpaper-toolbar">
          <input
            type="text"
            className="settings-input"
            placeholder="Wallpaper image URL"
            value={inputValue}
            onChange={(e) => setInputValue(e.target.value)}
          />
          <button className="settings-btn" onClick={onFetchClick}>Add</button>
          <button className="settings-btn primary" onClick={() => setShowPicker(true)}>
            <span className="material-symbols-outlined" style={{fontSize: '1.1rem', verticalAlign: '-2px', marginRight: '0.25rem'}}>folder_open</span>
            Choose from Files
          </button>
        </div>
        <div className="wallpaper-grid">
          {wallpapers.map((url, index) => {
            const fullUrl = toFullUrl(url);
            const active = fullUrl === activeWallpaper;
            return (
              <div
                key={index}
                className={`wallpaper-card ${active ? 'active' : ''}`}
                onClick={() => onClickHandler(url)}
                onContextMenu={(ev) => onContextMenuHandler(ev, url)}
              >
                <img src={fullUrl} alt={`Wallpaper ${index + 1}`} className="wallpaper-thumb" />
                <div className="wallpaper-overlay">
                  {active ? (
                    <span className="material-symbols-outlined wallpaper-check">check_circle</span>
                  ) : (
                    <span className="wallpaper-overlay-label">Set as Wallpaper</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        {showPicker && (
          <FilePicker
            title="Choose a wallpaper image"
            initialDir="/home/user1"
            accept={imageExtensions}
            onSelect={onPickFromFiles}
            onClose={() => setShowPicker(false)}
          />
        )}
        {contextMenu && (
          <div className="wallpaper-context-menu" style={{ left: contextMenu.x, top: contextMenu.y }}>
            <button onClick={() => onDeleteWallpaper(contextMenu.wallpaper)}>Delete</button>
          </div>
        )}
      </div>
    );
  };

</script>
