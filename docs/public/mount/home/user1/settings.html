<script type="module" defer>
  onload = () => {
    const React = platform.getService('React');
    const ReactDOM = platform.getService('ReactDOM');
    const props = platform.getService('props');

    // console.log(props, React, ReactDOM);

    props.toggleHeader(false);
    
    const dom = document.getElementById('react-root');
    const root = ReactDOM.createRoot(dom);
    const appModuleSource = document.querySelector('script[type="text/React-Jsx"]').innerText;

    const {App} = platform.host.execString(appModuleSource);
    root.render(React.createElement(App, props, []));
    


    // document.getElementById('render-btn').addEventListener('click', () => {
    //   props.close();
    // });

    // const dragger = document.getElementById('dragger');
    const dragger = dom
    
    let isDragging = false;
    let startX, startY, startRect;

    const onDragStart = (event) => {
      isDragging = true;
      startRect = props.getBoundingClientRect();
      startX = event.clientX;
      startY = event.clientY;
      if(event.target.localName === 'section') event.preventDefault(); // Prevent default dragging behavior
    };

    const onDrag = (event) => {
      if (!isDragging) return;

      const deltaX = event.clientX - startX;
      const deltaY = event.clientY - startY;

      const newRect = {
        left: startRect.left + deltaX,
        top: startRect.top + deltaY,
        right: startRect.right + deltaX,
        bottom: startRect.bottom + deltaY
      };

      props.setBoundingClientRect(newRect);
    };

    const onDragEnd = () => {
      isDragging = false;
    };

    dragger.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', onDragEnd);

    // Function to center the iframe
    const centerIframe = () => {
      const currentRect = props.getBoundingClientRect();
      const iframeWidth = currentRect.right - currentRect.left;
      const iframeHeight = currentRect.bottom - currentRect.top;

      // Parent dimensions based on iframe size and offsets, using props.host dimensions
      const parentWidth = iframeWidth + currentRect.left + (props.host.innerWidth - currentRect.right);
      const parentHeight = iframeHeight + currentRect.top + (props.host.innerHeight - currentRect.bottom);

      // Calculate new centered position
      const newRect = {
        left: (parentWidth - iframeWidth) / 2,
        top: (parentHeight - iframeHeight) / 2,
        right: (parentWidth + iframeWidth) / 2,
        bottom: (parentHeight + iframeHeight) / 2
      };

      props.setBoundingClientRect(newRect);
    };

    const centerAndResize = () => {
      // Calculate new centered position
      const newRect = {
        left: '15%',
        top: '5%',
        height: '90%',
        width: '70%',
        borderRadius: '1.5rem'
      };

      props.setBoundingClientRect(newRect);
    };

    centerAndResize()
  };

</script>
<script type="text/React-Jsx">
  const React = require('React');
  exports.App = (props) => {
    const origin = platform.window.location.origin || platform.window.location.ancestorOrigins[0] || '';

    const onCloseHandler = () => {
      props.close();
    };
    const pages = [

      {id: '2', name: 'projects', label: 'Projects', component: Projects},
      {id: '3', name: 'contact', label: 'Contact', component: Contact},
      {id: '4', name: 'wallpapers', label: 'Wallpapers', component: Wallpapers, marginTop: 'auto'},

        }}>

            display: 'flex',
            flexDirection: 'column',
            // justifyContent: 'space-evenly',

                marginTop: page.marginTop

              onClick={_ => setCurrentPage(page)}
              >{page.label}</a>
            })}
          </nav>
          <section style={{flexGrow: '1', padding: '0rem', fontFamily: 'monospace', overflow: 'auto'}}>
            {
              <currentPage.component/>
            }
          </section>
        </div>
      </>
    );
  };


  const About = () => {
    const [minionImgId, setMinionImgId] = React.useState(0)

    React.useEffect(() => {
      const interval = setInterval(() => {
        setMinionImgId(prevId => (prevId + 1) % 3);
      }, 30000);
    
      return () => clearInterval(interval);
    }, []);
    
    return (
      <div style={{
        display: 'flex',
        flexDirection: 'column',
        // justifyContent: 'center',
        // alignItems: 'center',
        height: '-webkit-fill-available',
        fontFamily: 'Arial, sans-serif',
        // textAlign: 'center',
        color: '#333',
        padding: '1rem',
        backgroundImage: `url(${origin}/public/minion-${minionImgId}.png)`,
        backgroundSize: `auto`,
        // filter: 'grayscale(100%)',
        backgroundPosition: 'bottom right',
        backgroundRepeat: 'no-repeat',
      }}>
        <h1 style={{ fontSize: '2rem', marginBottom: '1rem' }}>Hi! I'm Pankaj devesh</h1>
        <p style={{ fontSize: '1.1rem', maxWidth: '30rem', lineHeight: '1.6' }}>
          We are a passionate team dedicated to providing innovative solutions. 
          Our focus is on delivering quality products and services that make a difference. 
          Our mission is to enhance the lives of our users through technology.
        </p>
        <p style={{ fontSize: '1.1rem', maxWidth: '20rem', lineHeight: '1.6' }}>
          With years of experience in the industry, we prioritize customer satisfaction 
          and continuous improvement, ensuring that our offerings meet and exceed expectations.
        </p>
      </div>
    );
  };
  
  
  const fs = platform.host.getFS()
  const metaFileRawContent = fs.readFileSync('/user-preferences.json')
  const configWallpapers = JSON.parse(metaFileRawContent).wallpapers ?? []

  const Projects = () => {
    const projectsDir = '/home/user1/projects'
    const [ls, setLs] = React.useState(fs.readdirSync(projectsDir))

    const openProject = file => {
      const cmd = `service('root', 'exec') ('${projectsDir}/${file}');`
      platform.host.execCommand(cmd, platform);
    }
    return (<>{ls.map(file => <div onClick={_=>openProject(file)} key={`${projectsDir}/${file}`} style={{padding: '1rem', cursor: 'pointer'}}>{file}</div>)}</>)
  }

  const Contact = () => {
    return (<>Contact</>)
  }

  const Layout = () => {
    const readLayouts = () => {
      try {
        return JSON.parse(fs.readFileSync('/etc/wm/layouts.json', 'utf-8')).layouts ?? []
      } catch (err) {
        return []
      }
    }

    const readCurrentLayout = () => {
      try {
        return JSON.parse(fs.readFileSync('/etc/wm/config.json', 'utf-8')).layout ?? 'default'
      } catch (err) {
        return 'default'
      }
    }

    const [layouts] = React.useState(readLayouts);
    const [currentLayout, setCurrentLayout] = React.useState(readCurrentLayout);

    const onSelectLayout = (layoutId) => {
      setCurrentLayout(layoutId);
      platform.host.callCommand('set-layout', layoutId);
    };

    const cardStyle = (active) => ({
      padding: '1rem',
      margin: '0.5rem 0',
      border: active ? '2px solid #007bff' : '1px solid #ccc',
      borderRadius: '8px',
      cursor: 'pointer',
      background: active ? '#e9f3ff' : 'white',
    });

    return (
      <div style={{padding: '1rem'}}>
        <h2>Layout</h2>
        <p>Choose how the desktop, taskbar and windows are arranged.</p>
        {layouts.map(layout => (
          <div key={layout.id} style={cardStyle(layout.id === currentLayout)} onClick={() => onSelectLayout(layout.id)}>
            <strong>{layout.name}</strong>
            {layout.id === currentLayout ? <span style={{marginLeft: '0.5rem', color: '#007bff'}}>(active)</span> : null}
          </div>
        ))}
        <p style={{color: '#555', fontSize: '0.9rem'}}>
          Layouts are stored in <code>/etc/wm/layouts.json</code> and the active layout in <code>/etc/wm/config.json</code> — edit these files directly to customize or add new layouts.
        </p>
      </div>
    )
  }

  const WM_SETTINGS_PATH = '/etc/wm/current.json'
  const WM_THEMES_DIR = '/etc/wm/themes'

  const DEFAULT_WM_SETTINGS = {
    appearance: {
      headerBackground: '#000000',
      headerColor: '#ffffff',
      windowBackground: 'rgba(255, 255, 255, 0.15)',
      taskbarBackground: 'rgba(0, 0, 0, 0.5)',
      taskbarSize: 56,
      accentColor: '#0a84ff',
      borderRadius: 6,
      blur: 10,
      shadow: true,
    },
    behavior: {
      dblClickHeaderFullscreen: true,
      bringToFrontOnClick: true,
    },
  }

  // Parses '#rrggbb[aa]' or 'rgb(a)(...)' CSS colors into {r, g, b, a}.
  const parseCssColor = (str) => {
    str = (str || '').trim()
    if (str.startsWith('#')) {
      let hex = str.slice(1)
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('')
      const r = parseInt(hex.slice(0, 2), 16) || 0
      const g = parseInt(hex.slice(2, 4), 16) || 0
      const b = parseInt(hex.slice(4, 6), 16) || 0
      const a = hex.length >= 8 ? parseInt(hex.slice(6, 8), 16) / 255 : 1
      return { r, g, b, a }
    }
    const m = str.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*(?:,\s*([\d.]+)\s*)?\)/)
    if (m) return { r: +m[1], g: +m[2], b: +m[3], a: m[4] !== undefined ? +m[4] : 1 }
    return { r: 0, g: 0, b: 0, a: 1 }
  }

  const rgbToHex = (r, g, b) => '#' + [r, g, b].map(x => Math.round(x).toString(16).padStart(2, '0')).join('')

  // Color + opacity picker that reads/writes an 'rgba(r, g, b, a)' CSS color string.
  const ColorAlphaInput = ({ value, onChange }) => {
    const { r, g, b, a } = parseCssColor(value)
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
        <input type="color" value={rgbToHex(r, g, b)} onChange={e => {
          const next = parseCssColor(e.target.value)
          onChange(`rgba(${next.r}, ${next.g}, ${next.b}, ${a})`)
        }} />
        <input type="range" min="0" max="1" step="0.01" value={a} title="Opacity"
          onChange={e => onChange(`rgba(${r}, ${g}, ${b}, ${e.target.value})`)}
          style={{ width: '5rem' }} />
        <span style={{ fontSize: '0.75rem', color: '#666', width: '2.5rem', textAlign: 'right' }}>{Math.round(a * 100)}%</span>
      </div>
    )
  }

  const WindowManagerSettings = () => {
    const readWmSettings = () => {
      try {
        const raw = JSON.parse(fs.readFileSync(WM_SETTINGS_PATH, 'utf-8'))
        return {
          appearance: { ...DEFAULT_WM_SETTINGS.appearance, ...raw.appearance },
          behavior: { ...DEFAULT_WM_SETTINGS.behavior, ...raw.behavior },
        }
      } catch (err) {
        return DEFAULT_WM_SETTINGS
      }
    }

    const readThemes = () => {
      try {
        if (!fs.existsSync(WM_THEMES_DIR)) return []
        return fs.readdirSync(WM_THEMES_DIR)
          .filter(f => f.endsWith('.json'))
          .map(file => {
            const id = file.replace(/\.json$/, '')
            let raw = {}
            try { raw = JSON.parse(fs.readFileSync(`${WM_THEMES_DIR}/${file}`, 'utf-8')) } catch (err) {}
            return {
              id,
              name: raw.name || id,
              appearance: { ...DEFAULT_WM_SETTINGS.appearance, ...raw.appearance },
            }
          })
      } catch (err) {
        return []
      }
    }

    const [settings, setSettings] = React.useState(readWmSettings)
    const [themes] = React.useState(readThemes)
    const [currentThemeId, setCurrentThemeId] = React.useState(() => {
      try {
        return JSON.parse(fs.readFileSync(WM_SETTINGS_PATH, 'utf-8')).name?.toLowerCase()
      } catch (err) {
        return undefined
      }
    })

    const persist = (next) => {
      setSettings(next)
      setCurrentThemeId(undefined)
      if (!fs.existsSync('/etc/wm')) fs.mkdirSync('/etc/wm', { recursive: true })
      fs.writeFileSync(WM_SETTINGS_PATH, JSON.stringify(next, null, 2))
      platform.host.callCommand('set-window-manager-settings', next)
    }

    const selectTheme = (theme) => {
      platform.host.callCommand('set-window-manager-theme', theme.id)
      setCurrentThemeId(theme.id)
      setSettings(readWmSettings())
    }

    const setAppearance = (key, value) => {
      persist({ ...settings, appearance: { ...settings.appearance, [key]: value } })
    }

    const setBehavior = (key, value) => {
      persist({ ...settings, behavior: { ...settings.behavior, [key]: value } })
    }

    const resetToDefaults = () => persist(DEFAULT_WM_SETTINGS)

    const rowStyle = { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '1rem', padding: '0.6rem 0', borderBottom: '1px solid #eee' }
    const labelStyle = { flex: 1 }
    const sectionTitleStyle = { marginTop: '1.5rem', marginBottom: '0.25rem' }

    const themeCardStyle = (active) => ({
      display: 'flex',
      alignItems: 'center',
      gap: '0.75rem',
      padding: '0.6rem 0.8rem',
      margin: '0.4rem 0',
      border: active ? '2px solid #007bff' : '1px solid #ccc',
      borderRadius: '8px',
      cursor: 'pointer',
      background: active ? '#e9f3ff' : 'white',
    })

    const swatchStyle = (appearance) => ({
      width: '2.5rem',
      height: '1.6rem',
      borderRadius: `${Math.min(appearance.borderRadius, 8)}px`,
      background: appearance.windowBackground,
      border: `2px solid ${appearance.headerBackground}`,
      outline: `2px solid ${appearance.accentColor}`,
      flexShrink: 0,
    })

    return (
      <div style={{ padding: '1rem', maxWidth: '32rem' }}>
        <h2>Window Manager</h2>
        <p>Customize the appearance and behavior of application windows.</p>

        <h3 style={sectionTitleStyle}>Themes</h3>
        {themes.map(theme => (
          <div key={theme.id} style={themeCardStyle(theme.id === currentThemeId)} onClick={() => selectTheme(theme)}>
            <div style={swatchStyle(theme.appearance)} />
            <strong>{theme.name}</strong>
            {theme.id === currentThemeId ? <span style={{marginLeft: 'auto', color: '#007bff'}}>(active)</span> : null}
          </div>
        ))}

        <h3 style={sectionTitleStyle}>Appearance</h3>
        <div style={rowStyle}>
          <label style={labelStyle}>Title bar background</label>
          <input type="color" value={settings.appearance.headerBackground} onChange={e => setAppearance('headerBackground', e.target.value)} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Title bar text color</label>
          <input type="color" value={settings.appearance.headerColor} onChange={e => setAppearance('headerColor', e.target.value)} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Window background</label>
          <ColorAlphaInput value={settings.appearance.windowBackground} onChange={v => setAppearance('windowBackground', v)} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Taskbar background</label>
          <ColorAlphaInput value={settings.appearance.taskbarBackground} onChange={v => setAppearance('taskbarBackground', v)} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Taskbar size ({settings.appearance.taskbarSize}px)</label>
          <input type="range" min="40" max="96" value={settings.appearance.taskbarSize} onChange={e => setAppearance('taskbarSize', Number(e.target.value))} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Accent color</label>
          <input type="color" value={settings.appearance.accentColor} onChange={e => setAppearance('accentColor', e.target.value)} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Corner radius ({settings.appearance.borderRadius}px)</label>
          <input type="range" min="0" max="24" value={settings.appearance.borderRadius} onChange={e => setAppearance('borderRadius', Number(e.target.value))} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Background blur ({settings.appearance.blur}px)</label>
          <input type="range" min="0" max="40" value={settings.appearance.blur} onChange={e => setAppearance('blur', Number(e.target.value))} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Drop shadow</label>
          <input type="checkbox" checked={settings.appearance.shadow} onChange={e => setAppearance('shadow', e.target.checked)} />
        </div>

        <h3 style={sectionTitleStyle}>Behavior</h3>
        <div style={rowStyle}>
          <label style={labelStyle}>Double-click title bar to toggle fullscreen</label>
          <input type="checkbox" checked={settings.behavior.dblClickHeaderFullscreen} onChange={e => setBehavior('dblClickHeaderFullscreen', e.target.checked)} />
        </div>
        <div style={rowStyle}>
          <label style={labelStyle}>Bring window to front on click</label>
          <input type="checkbox" checked={settings.behavior.bringToFrontOnClick} onChange={e => setBehavior('bringToFrontOnClick', e.target.checked)} />
        </div>

        <div style={{ marginTop: '1rem' }}>
          <button onClick={resetToDefaults} style={{ padding: '0.4rem 0.8rem', cursor: 'pointer' }}>Reset to defaults</button>
        </div>

        <p style={{ color: '#555', fontSize: '0.9rem', marginTop: '1.5rem' }}>
          Selecting a theme or changing a toggle writes the active settings to{' '}
          <code>/etc/wm/current.json</code>, which applies to windows immediately. Themes are stored as
          individual files in <code>/etc/wm/themes/</code> &mdash; add your own JSON files there to make
          them available here. For deeper customization (e.g. new window behaviors), edit{' '}
          <code>/opt/window-manager.js</code> in the file explorer &mdash; it is re-loaded every time a
          window is opened.
        </p>
      </div>
    )
  }

  const Wallpapers = () => {
  
    const origin = platform.window.location.origin || platform.window.location.ancestorOrigins[0] || '';
    const [inputValue, setInputValue] = React.useState('');
    const [wallpapers, setWallpapers] = React.useState(configWallpapers);

    React.useEffect(() => {
      const metaFileRawContent = fs.readFileSync('/user-preferences.json')
      const configWallpapers = JSON.parse(metaFileRawContent).wallpapers ?? []
      setWallpapers(configWallpapers)

    }, [])

  
    const gridStyle = {
      display: 'grid',
      gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))',
      gap: '20px',
      padding: '20px',
    };
  
    const imageStyle = {
      width: '100%',
      height: '150px',
      objectFit: 'cover',
      borderRadius: '8px',
      cursor: 'pointer',
    };
  
    const inputContainerStyle = {
      display: 'flex',
      justifyContent: 'center',
      alignItems: 'center',
      position: 'fixed',
      bottom: '10px',
      width: '50%',
    };
  
    const inputStyle = {
      flexGrow: 1,
      marginLeft: '10px',
      maxWidth: '600px',
      padding: '0.5rem',
      border: '1px solid #ccc',
      borderRadius: '4px',
    };
  
    const buttonStyle = {
      marginLeft: '10px',
      padding: '0.5rem 1rem',
      backgroundColor: '#007bff',
      color: 'white',
      border: 'none',
      borderRadius: '4px',
      cursor: 'pointer',
    };
  
    const onClickHandler = (wallpaper) => {
      const newWallpaper = wallpaper.startsWith('/') ? `${origin}${wallpaper}` : wallpaper;
      if(!wallpapers.includes(wallpaper)) {
        const addWallpaper = platform.getService('add-wallpaper');
        setWallpapers(state => [...state, newWallpaper]);
        platform.host.callCommand('add-wallpaper', wallpaper);
      }

      platform.host.callCommand('set-wallpaper', newWallpaper);
    };
  
    const onFetchClick = () => {
      // if (inputValue) {
      //   onClickHandler(inputValue);
      // }

      if(!wallpapers.includes(inputValue)) {
        setWallpapers(state => [...state, inputValue]);
        platform.host.callCommand('add-wallpaper', inputValue);
        setInputValue('')
      }
    };
  
    return (
      <>
        <div style={gridStyle}>
          {wallpapers.map((url, index) => (
            <div key={index} onClick={() => onClickHandler(url)}>
              {url.startsWith('/') ? (
                <img src={`${origin}${url}`} alt={`Wallpaper ${index + 1}`} style={imageStyle} />
              ) : (
                <img src={url} alt={`Wallpaper ${index + 1}`} style={imageStyle} />
              )}
            </div>
          ))}
        </div>
        {/* Input section at the bottom center */}
        <div style={inputContainerStyle}>
          <input
            type="text"
            placeholder="Enter URL"
            style={inputStyle}
            value={inputValue}
            onChange={(e) => setInputValue(e.target.value)} // Update state with input value
          />
          <button onClick={onFetchClick} style={buttonStyle}>
            Add Wallpaper
          </button>
        </div>
      </>
    );
  };

</script>
