<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Python REPL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #header {
      background: #181825;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    #header .logo { color: #f5c2e7; font-size: 15px; font-weight: bold; }
    #header .title { font-weight: 600; color: #cba6f7; }
    #header .file-label { color: #6c7086; font-size: 11px; margin-left: auto; }
    #header .run-file-btn {
      background: #313244; border: none; border-radius: 4px;
      padding: 3px 10px; color: #a6e3a1; cursor: pointer;
      font-family: inherit; font-size: 12px;
    }
    #header .run-file-btn:hover { background: #45475a; }
    #output-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
    }
    .out { white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
    .out.err  { color: #f38ba8; }
    .out.info { color: #6c7086; font-style: italic; }
    .out.cmd  { color: #89b4fa; }
    #input-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-top: 1px solid #313244;
      background: #181825;
      flex-shrink: 0;
      gap: 6px;
    }
    #prompt { color: #a6e3a1; font-weight: bold; flex-shrink: 0; min-width: 36px; }
    #repl-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #cdd6f4; font-family: inherit; font-size: 13px;
    }
    #run-btn {
      background: #313244; border: none; border-radius: 4px;
      padding: 4px 10px; color: #cdd6f4; cursor: pointer;
      font-family: inherit; font-size: 12px; flex-shrink: 0;
    }
    #run-btn:hover { background: #45475a; }
    #run-btn:disabled, #repl-input:disabled { opacity: 0.45; cursor: not-allowed; }
    .spinner-wrap {
      display: flex; align-items: center; gap: 10px;
      color: #6c7086; padding: 8px 0;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #313244; border-top-color: #cba6f7;
      border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="header">
    <span class="logo">py</span>
    <span class="title">Python REPL</span>
    <span class="file-label" id="file-label"></span>
    <button class="run-file-btn" id="run-file-btn" style="display:none">&#9654; Run file</button>
  </div>
  <div id="output-area">
    <div class="spinner-wrap" id="loading-msg">
      <div class="spinner"></div>
      Loading Pyodide (first load ~5 s)…
    </div>
  </div>
  <div id="input-row">
    <span id="prompt">&gt;&gt;&gt;</span>
    <input id="repl-input" type="text" placeholder="Loading…" disabled autocomplete="off" spellcheck="false" />
    <button id="run-btn" disabled>Run</button>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <script>
    const outputArea = document.getElementById('output-area');
    const inputEl    = document.getElementById('repl-input');
    const runBtn     = document.getElementById('run-btn');
    const promptEl   = document.getElementById('prompt');
    const fileLabel  = document.getElementById('file-label');
    const loadingMsg = document.getElementById('loading-msg');
    const runFileBtn = document.getElementById('run-file-btn');

    const params   = new URLSearchParams(location.search);
    const filePath = params.get('file') || '';
    if (filePath) {
      fileLabel.textContent = filePath;
      runFileBtn.style.display = '';
    }

    let pyodide      = null;
    let history      = [];
    let historyIdx   = -1;
    let mlBuffer     = '';
    let isMultiline  = false;
    let busy         = false;

    function print(text, cls) {
      if (loadingMsg && loadingMsg.parentNode) loadingMsg.remove();
      String(text).split('\n').forEach((line, i, arr) => {
        if (i === arr.length - 1 && line === '') return;
        const d = document.createElement('div');
        d.className = 'out' + (cls ? ' ' + cls : '');
        d.textContent = line;
        outputArea.appendChild(d);
      });
      outputArea.scrollTop = outputArea.scrollHeight;
    }

    function println(text, cls) {
      if (loadingMsg && loadingMsg.parentNode) loadingMsg.remove();
      const d = document.createElement('div');
      d.className = 'out' + (cls ? ' ' + cls : '');
      d.textContent = text;
      outputArea.appendChild(d);
      outputArea.scrollTop = outputArea.scrollHeight;
    }

    async function exec(code) {
      if (!pyodide || !code.trim()) return;
      busy = true;
      inputEl.disabled = true;
      runBtn.disabled  = true;
      try {
        const result = await pyodide.runPythonAsync(code);
        if (result !== undefined && result !== null) println(pyodide.globals.get('repr')(result));
      } catch (e) {
        println(e.message || String(e), 'err');
      } finally {
        busy = false;
        inputEl.disabled = false;
        runBtn.disabled  = false;
        inputEl.focus();
      }
    }

    async function submit() {
      if (busy) return;
      const line = inputEl.value;
      inputEl.value = '';

      if (isMultiline) {
        println((line.trim() === '' ? '' : '... ') + line, 'cmd');
        if (line.trim() === '') {
          const code = mlBuffer;
          mlBuffer = ''; isMultiline = false;
          promptEl.textContent = '>>>';
          if (history[history.length - 1] !== code) history.push(code);
          historyIdx = history.length;
          await exec(code);
        } else {
          mlBuffer += '\n' + line;
        }
        return;
      }

      println('>>> ' + line, 'cmd');
      if (!line.trim()) return;
      if (history[history.length - 1] !== line) history.push(line);
      historyIdx = history.length;

      // Detect incomplete statement to enter multiline mode.
      const endsColon = line.trimEnd().endsWith(':');
      let incomplete = endsColon;
      if (!incomplete) {
        try {
          pyodide.runPython('compile(' + JSON.stringify(line) + ', "<stdin>", "single")');
        } catch (e) {
          const msg = String(e);
          if (msg.includes('SyntaxError') && (msg.includes('unexpected EOF') || msg.includes('was never closed') || msg.includes('expected an indented'))) {
            incomplete = true;
          }
        }
      }

      if (incomplete) {
        isMultiline = true;
        mlBuffer = line;
        promptEl.textContent = '...';
      } else {
        await exec(line);
      }
    }

    inputEl.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        await submit();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIdx > 0) { historyIdx--; inputEl.value = history[historyIdx]; }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIdx < history.length - 1) { historyIdx++; inputEl.value = history[historyIdx]; }
        else { historyIdx = history.length; inputEl.value = ''; }
      } else if (e.key === 'Escape') {
        inputEl.value = ''; mlBuffer = ''; isMultiline = false; promptEl.textContent = '>>>';
      }
    });

    runBtn.addEventListener('click', submit);

    async function runFile(path) {
      println('# Running: ' + path, 'info');
      try {
        const resp = await fetch('/(sw)' + path);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        await exec(await resp.text());
      } catch (e) {
        println('Error loading file: ' + (e.message || e), 'err');
      }
      println('', '');
    }

    runFileBtn.addEventListener('click', () => { if (filePath) runFile(filePath); });

    async function init() {
      try {
        pyodide = await loadPyodide({
          indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/',
        });
        pyodide.setStdout({ batched: (t) => print(t) });
        pyodide.setStderr({ batched: (t) => print(t, 'err') });

        if (loadingMsg && loadingMsg.parentNode) loadingMsg.remove();
        const pyVer = pyodide.runPython('import sys; sys.version.split()[0]');
        println('Python ' + pyVer + ' (Pyodide 0.26.4)', 'info');
        println('Type expressions and press Enter. Empty line submits a block.', 'info');
        println('', '');

        if (filePath) await runFile(filePath);

        inputEl.disabled = false;
        runBtn.disabled  = false;
        inputEl.placeholder = 'Enter Python code…';
        inputEl.focus();
      } catch (e) {
        if (loadingMsg && loadingMsg.parentNode) loadingMsg.remove();
        println('Failed to load Pyodide: ' + (e.message || e), 'err');
      }
    }

    init();
  </script>
</body>
</html>
