<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dashboard</title>
<style>
  :root {
    --bg: #141517;
    --surface: #1a1b1e;
    --surface2: #25262b;
    --surface3: #2c2e33;
    --border: #373a40;
    --text: #c1c2c5;
    --text-dim: #909296;
    --text-bright: #e9ecef;
    --accent: #4dabf7;
    --danger: #ff6b6b;
    --radius: 10px;
    --card-w: 160px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; }

  /* ── Header ── */
  #header { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  #logo { font-size: 15px; font-weight: 600; color: var(--text-bright); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  #search { flex: 1; min-width: 120px; max-width: 260px; padding: 5px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }

  .tabs { display: flex; gap: 2px; background: var(--surface2); border-radius: 7px; padding: 2px; border: 1px solid var(--border); }
  .tab-pill { padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-dim); transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .tab-pill.active { background: var(--surface3); color: var(--text-bright); }
  .tab-pill:hover:not(.active) { color: var(--text); }

  .btn { padding: 5px 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 12px; white-space: nowrap; transition: background 0.12s, color 0.12s, border-color 0.12s; display: inline-flex; align-items: center; gap: 4px; }
  .btn:hover { background: var(--surface3); border-color: #4a4d56; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #339af0; border-color: #339af0; }
  .btn.danger { color: var(--danger); border-color: #5c2a2a; }
  .btn.danger:hover { background: #3a1c1c; }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Content ── */
  #content { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 18px; }
  #content::-webkit-scrollbar { width: 5px; }
  #content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Bookmarks ── */
  .group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .group-accent { width: 4px; height: 16px; border-radius: 2px; flex-shrink: 0; }
  .group-name { font-size: 11px; font-weight: 700; color: var(--text-bright); letter-spacing: 1px; text-transform: uppercase; flex: 1; }
  .group-actions { display: flex; gap: 3px; }
  .icon-btn { width: 24px; height: 24px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: background 0.12s, color 0.12s; }
  .icon-btn:hover { background: var(--surface3); color: var(--text-bright); }
  .icon-btn.del:hover { background: #3a1c1c; color: var(--danger); border-color: #5c2a2a; }

  .cards { display: flex; flex-wrap: wrap; gap: 8px; }
  .card { position: relative; width: var(--card-w); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 10px 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s; display: flex; flex-direction: column; gap: 5px; overflow: hidden; }
  .card:hover { border-color: #4a4d56; background: var(--surface2); transform: translateY(-1px); }
  .card-top-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; opacity: 0.7; }
  .card-icon { font-size: 26px; line-height: 1; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-desc { font-size: 11px; color: var(--text-dim); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
  .card-edit-overlay { position: absolute; top: 4px; right: 4px; display: none; gap: 3px; }
  .edit-mode .card:hover .card-edit-overlay { display: flex; }
  .edit-mode .card { cursor: default; }
  .edit-mode .card:hover { transform: none; }
  .overlay-btn { width: 20px; height: 20px; border-radius: 4px; border: none; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; background: rgba(20,21,23,0.85); color: var(--text-dim); }
  .overlay-btn:hover { color: var(--text-bright); }
  .overlay-btn.del:hover { color: var(--danger); }
  .card-add { width: var(--card-w); border: 1px dashed var(--border); border-radius: var(--radius); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--text-dim); font-size: 12px; padding: 12px; transition: border-color 0.15s, color 0.15s; min-height: 90px; }
  .edit-mode .card-add { display: flex; }
  .card-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Widget grid ── */
  .widget-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .widget-card { position: relative; width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 12px 12px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; transition: border-color 0.15s; }
  .widget-card-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; }
  .widget-icon { font-size: 24px; line-height: 1; }
  .widget-title { font-size: 13px; font-weight: 600; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .type-badge { display: inline-flex; align-items: center; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; background: var(--surface2); color: var(--text-dim); width: fit-content; border: 1px solid var(--border); }
  .widget-actions { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
  .running-dot { width: 7px; height: 7px; border-radius: 50%; background: #69db7c; display: inline-block; margin-right: 3px; box-shadow: 0 0 5px rgba(105,219,124,0.5); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .widget-edit-overlay { position: absolute; top: 6px; right: 6px; display: none; gap: 3px; }
  .edit-mode .widget-card:hover .widget-edit-overlay { display: flex; }
  .widget-add { width: 200px; border: 1px dashed var(--border); border-radius: var(--radius); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; color: var(--text-dim); font-size: 12px; padding: 14px; transition: border-color 0.15s, color 0.15s; min-height: 110px; }
  .edit-mode .widget-add { display: flex; }
  .widget-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Empty ── */
  #empty { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 10px; color: var(--text-dim); font-size: 13px; text-align: center; }
  #empty .ei { font-size: 44px; opacity: 0.35; }

  /* ── Modal ── */
  #modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  #modal-bg.open { display: flex; }
  #modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; width: 360px; max-width: 95vw; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  #modal h2 { font-size: 14px; color: var(--text-bright); }
  .fg { display: flex; flex-direction: column; gap: 4px; }
  .fg label { font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .fg input, .fg textarea, .fg select { padding: 6px 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
  .fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--accent); }
  .fg textarea { resize: vertical; min-height: 80px; }
  .fg select option { background: var(--surface2); }
  .fg .hint { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
  .color-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .csw { width: 22px; height: 22px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; flex-shrink: 0; }
  .csw:hover { transform: scale(1.15); }
  .csw.sel { border-color: #fff; }
  .csw-c { width: 22px; height: 22px; border-radius: 5px; border: 1px dashed var(--border); cursor: pointer; overflow: hidden; flex-shrink: 0; }
  .csw-c input[type=color] { width: 30px; height: 30px; border: none; cursor: pointer; transform: translate(-4px,-4px); background: none; padding: 0; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">📊 Dashboard</div>
    <input id="search" type="text" placeholder="Search bookmarks…" oninput="onSearch(this.value)" autocomplete="off">
    <div class="tabs">
      <div class="tab-pill active" id="tab-bookmarks" onclick="switchTab('bookmarks')">📑 Bookmarks</div>
      <div class="tab-pill" id="tab-widgets" onclick="switchTab('widgets')">⬡ Widgets</div>
    </div>
    <button class="btn active" id="edit-btn" onclick="toggleEdit()">✎ Edit</button>
    <button class="btn primary" id="add-btn" style="display:none" onclick="onAddClick()">＋ <span id="add-label">Group</span></button>
  </div>
  <div id="content"></div>
  <div id="empty">
    <div class="ei" id="ei">📋</div>
    <div id="em">No bookmarks yet.</div>
    <button class="btn primary" onclick="onEmptyAction()">Get started</button>
  </div>
</div>

<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
  const CONFIG_PATH = '/home/user1/dashboard.json';
  const COLORS = ['#4dabf7','#74c0fc','#69db7c','#a9e34b','#ffd43b','#ff922b','#f783ac','#cc5de8','#845ef7','#20c997','#ff6b6b','#909296'];
  const WIDGET_TYPES = {
    clock:  { label: 'Clock',    icon: '🕐', color: '#4dabf7' },
    iframe: { label: 'Web View', icon: '🌐', color: '#69db7c' },
    custom: { label: 'Custom',   icon: '⚙️', color: '#ffd43b' },
    note:   { label: 'Note',     icon: '📝', color: '#f783ac' },
  };

  const DEFAULT_CONFIG = {
    groups: [
      {
        id: uid(), name: 'Development', color: '#4dabf7',
        items: [
          { id: uid(), title: 'GitHub', url: 'https://github.com', description: 'Code hosting and collaboration', icon: '🐙' },
          { id: uid(), title: 'MDN Web Docs', url: 'https://developer.mozilla.org', description: 'Web platform documentation', icon: '📚' },
          { id: uid(), title: 'Stack Overflow', url: 'https://stackoverflow.com', description: 'Q&A for developers', icon: '💡' },
        ]
      },
      {
        id: uid(), name: 'Tools', color: '#69db7c',
        items: [
          { id: uid(), title: 'NPM', url: 'https://npmjs.com', description: 'Node package registry', icon: '📦' },
          { id: uid(), title: 'Can I Use', url: 'https://caniuse.com', description: 'Browser compatibility tables', icon: '🌐' },
          { id: uid(), title: 'Regex101', url: 'https://regex101.com', description: 'Regular expression tester', icon: '🔍' },
        ]
      }
    ],
    widgets: [],
  };

  function uid() { return Math.random().toString(36).slice(2, 10); }

  // ── State ─────────────────────────────────────────────────
  let state = loadConfig();
  if (!state.groups) state.groups = [];
  if (!state.widgets) state.widgets = [];
  let editMode = false;
  let currentTab = 'bookmarks';
  let searchQuery = '';
  let modalCb = null;
  // widgetId -> { remove: () => void } returned by registerWidget
  const activeWidgetRemovers = new Map();

  // ── FS ─────────────────────────────────────────────────────
  function getFS() { return window.platform.host.getFS(); }
  function loadConfig() {
    try {
      const fs = getFS();
      if (fs.existsSync(CONFIG_PATH)) return JSON.parse(fs.readFileSync(CONFIG_PATH, 'utf8'));
    } catch (_) {}
    return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  }
  function saveConfig() {
    try { getFS().writeFileSync(CONFIG_PATH, JSON.stringify(state, null, 2)); }
    catch (e) { console.error('dashboard: save failed', e); }
  }

  // ── Widget render functions ────────────────────────────────
  // These run in the main-document context (container.ownerDocument)
  // and use the same CSS classes as system widgets.

  function renderClockWidget(container, api, cfg) {
    const doc = container.ownerDocument;
    const tz = cfg.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
    const label = cfg.label || '';
    const fmt24 = cfg.format24 !== false;

    if (label) {
      const lbl = doc.createElement('div');
      lbl.style.cssText = 'font-size:0.7rem;opacity:0.8;text-transform:uppercase;letter-spacing:0.08em;text-align:right;margin-bottom:2px;';
      lbl.textContent = label;
      container.appendChild(lbl);
    }

    const timeEl = doc.createElement('div');
    timeEl.className = 'widget-clock-time';
    const dateEl = doc.createElement('div');
    dateEl.className = 'widget-clock-date';
    container.appendChild(timeEl);
    container.appendChild(dateEl);

    const tick = () => {
      const now = new Date();
      try {
        timeEl.textContent = now.toLocaleTimeString('en-US', {
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          timeZone: tz, hour12: !fmt24,
        });
        dateEl.textContent = now.toLocaleDateString('en-US', {
          weekday: 'short', month: 'short', day: 'numeric', timeZone: tz,
        });
      } catch (_) {
        timeEl.textContent = now.toLocaleTimeString();
        dateEl.textContent = now.toLocaleDateString();
      }
    };
    tick();
    const timer = setInterval(tick, 1000);
    api.onDestroy(() => clearInterval(timer));
  }

  function renderIframeWidget(container, api, url) {
    const doc = container.ownerDocument;
    container.style.cssText = 'padding:0;width:360px;height:240px;overflow:hidden;';
    const fr = doc.createElement('iframe');
    fr.src = url;
    fr.style.cssText = 'width:100%;height:100%;border:none;display:block;';
    container.appendChild(fr);
  }

  function renderNoteWidget(container, api, content) {
    const doc = container.ownerDocument;
    const div = doc.createElement('div');
    div.style.cssText = 'white-space:pre-wrap;font-size:0.85rem;line-height:1.6;max-width:240px;';
    div.textContent = content || '';
    container.appendChild(div);
  }

  function renderCustomWidget(container, api, code) {
    const doc = container.ownerDocument;
    try {
      // eslint-disable-next-line no-new-func
      const fn = new Function('body', 'platform', 'document', 'api', code || '');
      const result = fn(container, api.platform, doc, api);
      if (typeof result === 'function') api.onDestroy(result);
    } catch (e) {
      const err = doc.createElement('div');
      err.style.cssText = 'color:#ff6b6b;font-family:monospace;font-size:11px;white-space:pre-wrap;max-width:220px;';
      err.textContent = 'Error: ' + (e.message || e);
      container.appendChild(err);
    }
  }

  // ── Widget launch / stop ───────────────────────────────────
  function launchWidget(widget) {
    if (activeWidgetRemovers.has(widget.id)) return; // already running

    const handle = window.platform.host.registerWidget(
      `dash-widget-${widget.id}`,
      (container, api) => {
        if (widget.type === 'clock')  renderClockWidget(container, api, widget.config || {});
        if (widget.type === 'iframe') renderIframeWidget(container, api, widget.url || '');
        if (widget.type === 'note')   renderNoteWidget(container, api, widget.content || '');
        if (widget.type === 'custom') renderCustomWidget(container, api, widget.code || '');
        // Remove from our tracking when the widget is destroyed externally
        // (e.g. the Settings > Widgets panel hides it — unlikely but safe)
        api.onDestroy(() => activeWidgetRemovers.delete(widget.id));
      },
      { alwaysVisible: true, title: widget.title }
    );

    activeWidgetRemovers.set(widget.id, handle.remove);
    render();
  }

  function stopWidget(widgetId) {
    const remove = activeWidgetRemovers.get(widgetId);
    if (remove) { remove(); activeWidgetRemovers.delete(widgetId); }
    render();
  }

  // ── Tab / edit ────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    searchQuery = '';
    document.getElementById('search').value = '';
    document.getElementById('search').style.display = tab === 'bookmarks' ? '' : 'none';
    document.getElementById('tab-bookmarks').classList.toggle('active', tab === 'bookmarks');
    document.getElementById('tab-widgets').classList.toggle('active', tab === 'widgets');
    document.getElementById('add-label').textContent = tab === 'bookmarks' ? 'Group' : 'Widget';
    render();
  }

  function toggleEdit() {
    editMode = !editMode;
    document.getElementById('edit-btn').classList.toggle('active', editMode);
    document.getElementById('add-btn').style.display = editMode ? '' : 'none';
    document.getElementById('add-label').textContent = currentTab === 'bookmarks' ? 'Group' : 'Widget';
    render();
  }

  function onAddClick() {
    if (currentTab === 'bookmarks') showGroupModal(null);
    else showWidgetModal(null);
  }
  function onSearch(val) { searchQuery = val; render(); }

  // ── Render ────────────────────────────────────────────────
  function render() {
    const content = document.getElementById('content');
    const empty = document.getElementById('empty');
    content.innerHTML = '';
    document.getElementById('app').classList.toggle('edit-mode', editMode);
    if (currentTab === 'bookmarks') renderBookmarks(content, empty);
    else renderWidgets(content, empty);
  }

  // ── Bookmarks ─────────────────────────────────────────────
  function renderBookmarks(content, empty) {
    const q = searchQuery.trim().toLowerCase();
    let groups = state.groups;
    if (q) {
      groups = groups.map(g => ({
        ...g,
        items: g.items.filter(i =>
          i.title.toLowerCase().includes(q) ||
          (i.description||'').toLowerCase().includes(q) ||
          (i.url||'').toLowerCase().includes(q)
        )
      })).filter(g => g.items.length > 0 || g.name.toLowerCase().includes(q));
    }
    const hasAny = state.groups.length > 0;
    empty.style.display = (!hasAny && !editMode) ? 'flex' : 'none';
    document.getElementById('ei').textContent = '📋';
    document.getElementById('em').textContent = 'No bookmarks yet.';
    content.style.display = (hasAny || editMode) ? 'flex' : 'none';

    groups.forEach(group => {
      const groupEl = document.createElement('div');
      const hdr = document.createElement('div');
      hdr.className = 'group-header';
      const accent = document.createElement('div');
      accent.className = 'group-accent';
      accent.style.background = group.color || '#4dabf7';
      const name = document.createElement('div');
      name.className = 'group-name';
      name.textContent = group.name;
      hdr.appendChild(accent);
      hdr.appendChild(name);
      if (editMode) {
        const acts = document.createElement('div');
        acts.className = 'group-actions';
        acts.appendChild(mkIconBtn('✎', 'Edit', () => showGroupModal(group.id)));
        acts.appendChild(mkIconBtn('✕', 'Delete', () => deleteGroup(group.id), true));
        hdr.appendChild(acts);
      }
      const cards = document.createElement('div');
      cards.className = 'cards';
      group.items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.title = item.url || '';
        const bar = document.createElement('div');
        bar.className = 'card-top-bar';
        bar.style.background = group.color || '#4dabf7';
        const icon = document.createElement('div');
        icon.className = 'card-icon';
        icon.textContent = item.icon || '🔗';
        const title = document.createElement('div');
        title.className = 'card-title';
        title.textContent = item.title || 'Untitled';
        card.appendChild(bar); card.appendChild(icon); card.appendChild(title);
        if (item.description) {
          const desc = document.createElement('div');
          desc.className = 'card-desc';
          desc.textContent = item.description;
          card.appendChild(desc);
        }
        if (editMode) {
          const ov = document.createElement('div');
          ov.className = 'card-edit-overlay';
          ov.appendChild(mkOvBtn('✎', false, e => { e.stopPropagation(); showCardModal(group.id, item.id); }));
          ov.appendChild(mkOvBtn('✕', true,  e => { e.stopPropagation(); deleteCard(group.id, item.id); }));
          card.appendChild(ov);
        } else {
          card.onclick = () => { if (item.url) window.open(item.url, '_blank', 'noopener'); };
          card.style.cursor = 'pointer';
        }
        cards.appendChild(card);
      });
      if (editMode) {
        const add = document.createElement('div');
        add.className = 'card-add';
        add.onclick = () => showCardModal(group.id, null);
        add.innerHTML = '<div class="card-add-icon" style="font-size:20px">＋</div><div>Add card</div>';
        cards.appendChild(add);
      }
      groupEl.appendChild(hdr);
      groupEl.appendChild(cards);
      content.appendChild(groupEl);
    });
    if (editMode && state.groups.length === 0) {
      const hint = document.createElement('div');
      hint.style.cssText = 'color:var(--text-dim);font-size:13px;padding:4px 0;';
      hint.textContent = 'Click "+ Group" to add your first group.';
      content.appendChild(hint);
    }
  }

  // ── Widgets tab ───────────────────────────────────────────
  function renderWidgets(content, empty) {
    const hasAny = state.widgets.length > 0;
    empty.style.display = (!hasAny && !editMode) ? 'flex' : 'none';
    document.getElementById('ei').textContent = '⬡';
    document.getElementById('em').textContent = 'No widgets defined yet.';
    content.style.display = (hasAny || editMode) ? 'flex' : 'none';

    const grid = document.createElement('div');
    grid.className = 'widget-grid';

    state.widgets.forEach(widget => {
      const wt = WIDGET_TYPES[widget.type] || WIDGET_TYPES.note;
      const running = activeWidgetRemovers.has(widget.id);

      const card = document.createElement('div');
      card.className = 'widget-card';

      const bar = document.createElement('div');
      bar.className = 'widget-card-bar';
      bar.style.background = wt.color;

      const icon = document.createElement('div');
      icon.className = 'widget-icon';
      icon.textContent = wt.icon;

      const title = document.createElement('div');
      title.className = 'widget-title';
      title.textContent = widget.title || 'Widget';

      const badge = document.createElement('div');
      badge.className = 'type-badge';
      badge.textContent = wt.label;

      const acts = document.createElement('div');
      acts.className = 'widget-actions';

      if (running) {
        const info = document.createElement('div');
        info.style.cssText = 'display:flex;align-items:center;font-size:11px;color:#69db7c;';
        info.innerHTML = '<span class="running-dot"></span> On desktop';
        const stop = document.createElement('button');
        stop.className = 'btn danger';
        stop.style.cssText = 'font-size:11px;padding:3px 8px;';
        stop.textContent = '■ Remove';
        stop.onclick = () => stopWidget(widget.id);
        acts.appendChild(info);
        acts.appendChild(stop);
      } else {
        const launch = document.createElement('button');
        launch.className = 'btn primary';
        launch.style.cssText = 'font-size:11px;padding:3px 8px;';
        launch.textContent = '▶ Show';
        launch.onclick = () => launchWidget(widget);
        acts.appendChild(launch);
      }

      card.appendChild(bar);
      card.appendChild(icon);
      card.appendChild(title);
      card.appendChild(badge);
      card.appendChild(acts);

      if (editMode) {
        const ov = document.createElement('div');
        ov.className = 'widget-edit-overlay';
        ov.appendChild(mkOvBtn('✎', false, e => { e.stopPropagation(); showWidgetModal(widget.id); }));
        ov.appendChild(mkOvBtn('✕', true,  e => { e.stopPropagation(); deleteWidget(widget.id); }));
        card.appendChild(ov);
      }

      grid.appendChild(card);
    });

    if (editMode) {
      const add = document.createElement('div');
      add.className = 'widget-add';
      add.onclick = () => showWidgetModal(null);
      add.innerHTML = '<div style="font-size:22px">＋</div><div>Add widget</div>';
      grid.appendChild(add);
    }
    content.appendChild(grid);
  }

  // ── CRUD ──────────────────────────────────────────────────
  function deleteGroup(groupId) {
    if (!confirm('Delete this group and all its cards?')) return;
    state.groups = state.groups.filter(g => g.id !== groupId);
    saveConfig(); render();
  }
  function deleteCard(groupId, cardId) {
    const g = state.groups.find(g => g.id === groupId);
    if (g) { g.items = g.items.filter(i => i.id !== cardId); saveConfig(); render(); }
  }
  function deleteWidget(widgetId) {
    stopWidget(widgetId);
    state.widgets = state.widgets.filter(w => w.id !== widgetId);
    saveConfig(); render();
  }

  // ── Modal system ──────────────────────────────────────────
  function showModal(title, bodyHtml, onSave) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    modalCb = onSave;
    document.getElementById('modal-bg').classList.add('open');
  }
  function closeModal() { document.getElementById('modal-bg').classList.remove('open'); modalCb = null; }
  function saveModal() { if (modalCb) modalCb(); }

  // ── Group modal ───────────────────────────────────────────
  function colorSwatchHtml(sel) {
    const sw = COLORS.map(c =>
      `<div class="csw${c===sel?' sel':''}" style="background:${c}" onclick="selColor('${c}',this)"></div>`
    ).join('');
    return `<input type="hidden" id="color-val" value="${sel||COLORS[0]}">
      <div class="color-row">${sw}<div class="csw-c"><input type="color" id="color-c" value="${sel||COLORS[0]}" oninput="selColor(this.value,null)"></div></div>`;
  }
  function selColor(c, el) {
    document.getElementById('color-val').value = c;
    document.querySelectorAll('.csw').forEach(s => s.classList.remove('sel'));
    if (el) el.classList.add('sel');
    const cc = document.getElementById('color-c');
    if (cc) cc.value = c;
  }

  function showGroupModal(groupId) {
    const g = groupId ? state.groups.find(x => x.id === groupId) : null;
    showModal(g ? 'Edit Group' : 'New Group', `
      <div class="fg"><label>Name</label><input id="g-name" type="text" value="${esc(g?.name||'')}" placeholder="e.g. Development"></div>
      <div class="fg"><label>Color</label>${colorSwatchHtml(g?.color||COLORS[0])}</div>
    `, () => {
      const name = document.getElementById('g-name').value.trim();
      const color = document.getElementById('color-val').value;
      if (!name) { document.getElementById('g-name').focus(); return; }
      if (g) { g.name = name; g.color = color; }
      else state.groups.push({ id: uid(), name, color, items: [] });
      saveConfig(); closeModal(); render();
    });
    setTimeout(() => document.getElementById('g-name')?.focus(), 50);
  }

  // ── Card modal ────────────────────────────────────────────
  function showCardModal(groupId, cardId) {
    const group = state.groups.find(g => g.id === groupId);
    if (!group) return;
    const card = cardId ? group.items.find(i => i.id === cardId) : null;
    showModal(card ? 'Edit Card' : 'New Card', `
      <div class="fg"><label>Title</label><input id="c-title" type="text" value="${esc(card?.title||'')}" placeholder="e.g. GitHub"></div>
      <div class="fg"><label>URL</label><input id="c-url" type="url" value="${esc(card?.url||'')}" placeholder="https://…"></div>
      <div class="fg"><label>Icon (emoji)</label><input id="c-icon" type="text" value="${esc(card?.icon||'')}" placeholder="🔗" maxlength="4" style="font-size:18px;width:56px"></div>
      <div class="fg"><label>Description</label><textarea id="c-desc" placeholder="Short description…">${esc(card?.description||'')}</textarea></div>
    `, () => {
      const title = document.getElementById('c-title').value.trim();
      const url   = document.getElementById('c-url').value.trim();
      const icon  = document.getElementById('c-icon').value.trim() || '🔗';
      const desc  = document.getElementById('c-desc').value.trim();
      if (!title) { document.getElementById('c-title').focus(); return; }
      if (card) Object.assign(card, { title, url, icon, description: desc });
      else group.items.push({ id: uid(), title, url, icon, description: desc });
      saveConfig(); closeModal(); render();
    });
    setTimeout(() => document.getElementById('c-title')?.focus(), 50);
  }

  // ── Widget modal ──────────────────────────────────────────
  function widgetTypeFields(type, w) {
    if (type === 'clock') return `
      <div class="fg"><label>Timezone</label>
        <input id="w-tz" type="text" value="${esc(w?.config?.timezone||'')}" placeholder="e.g. America/New_York (blank = local)">
        <div class="hint">Leave blank to use the system timezone.</div></div>
      <div class="fg"><label>Label</label><input id="w-label" type="text" value="${esc(w?.config?.label||'')}" placeholder="e.g. UTC"></div>
      <div class="fg"><label>Format</label>
        <select id="w-fmt"><option value="24"${w?.config?.format24!==false?' selected':''}>24-hour</option><option value="12"${w?.config?.format24===false?' selected':''}>12-hour</option></select></div>`;
    if (type === 'iframe') return `
      <div class="fg"><label>URL</label><input id="w-url" type="url" value="${esc(w?.url||'')}" placeholder="https://…">
        <div class="hint">Some sites block embedding (X-Frame-Options).</div></div>`;
    if (type === 'custom') return `
      <div class="fg"><label>JS Code</label>
        <textarea id="w-code" style="font-family:monospace;font-size:12px;min-height:180px;" placeholder="// body, platform, document, api are in scope&#10;const el = document.createElement('h2');&#10;el.textContent = 'Hello!';&#10;body.appendChild(el);&#10;// return a cleanup fn or call api.onDestroy(fn)">${esc(w?.code||'')}</textarea>
        <div class="hint">Variables: <code>body</code> (container element), <code>platform</code>, <code>document</code> (main doc), <code>api.onDestroy(fn)</code>. Return a function for cleanup.</div></div>`;
    if (type === 'note') return `
      <div class="fg"><label>Content</label><textarea id="w-content" style="min-height:120px;" placeholder="Your note…">${esc(w?.content||'')}</textarea></div>`;
    return '';
  }

  function showWidgetModal(widgetId) {
    const widget = widgetId ? state.widgets.find(w => w.id === widgetId) : null;
    const curType = widget?.type || 'clock';
    const typeOpts = Object.entries(WIDGET_TYPES)
      .map(([k, v]) => `<option value="${k}"${k===curType?' selected':''}>${v.icon} ${v.label}</option>`)
      .join('');
    showModal(widget ? 'Edit Widget' : 'New Widget', `
      <div class="fg"><label>Title</label><input id="w-title" type="text" value="${esc(widget?.title||'')}" placeholder="e.g. World Clock"></div>
      <div class="fg"><label>Type</label><select id="w-type" onchange="refreshWidgetFields()">${typeOpts}</select></div>
      <div id="w-fields">${widgetTypeFields(curType, widget)}</div>
    `, () => {
      const title = document.getElementById('w-title').value.trim();
      const type  = document.getElementById('w-type').value;
      if (!title) { document.getElementById('w-title').focus(); return; }
      const upd = { id: widget?.id || uid(), title, type };
      if (type === 'clock')  upd.config  = { timezone: document.getElementById('w-tz')?.value.trim()||'', label: document.getElementById('w-label')?.value.trim()||'', format24: document.getElementById('w-fmt')?.value !== '12' };
      if (type === 'iframe') upd.url     = document.getElementById('w-url')?.value.trim()||'';
      if (type === 'custom') upd.code    = document.getElementById('w-code')?.value||'';
      if (type === 'note')   upd.content = document.getElementById('w-content')?.value||'';
      if (widget) {
        // If running, stop and re-launch with updated config
        const wasRunning = activeWidgetRemovers.has(widget.id);
        if (wasRunning) stopWidget(widget.id);
        Object.assign(widget, upd);
        if (wasRunning) launchWidget(widget);
      } else {
        state.widgets.push(upd);
      }
      saveConfig(); closeModal(); render();
    });
    setTimeout(() => document.getElementById('w-title')?.focus(), 50);
  }

  function refreshWidgetFields() {
    const type = document.getElementById('w-type')?.value || 'clock';
    const snap = type === 'custom' ? { code: document.getElementById('w-code')?.value }
      : type === 'note'   ? { content: document.getElementById('w-content')?.value }
      : type === 'iframe' ? { url: document.getElementById('w-url')?.value } : null;
    const el = document.getElementById('w-fields');
    if (el) el.innerHTML = widgetTypeFields(type, snap);
  }

  // ── DOM helpers ───────────────────────────────────────────
  function mkIconBtn(text, title, onclick, danger) {
    const b = document.createElement('button');
    b.className = 'icon-btn' + (danger ? ' del' : '');
    b.title = title;
    b.textContent = text;
    b.onclick = onclick;
    return b;
  }
  function mkOvBtn(text, danger, onclick) {
    const b = document.createElement('button');
    b.className = 'overlay-btn' + (danger ? ' del' : '');
    b.textContent = text;
    b.onclick = onclick;
    return b;
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function onEmptyAction() {
    if (!editMode) toggleEdit();
    if (currentTab === 'bookmarks') showGroupModal(null);
    else showWidgetModal(null);
  }

  // ── Keyboard ──────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modal-bg').classList.contains('open')) {
      if (e.target?.tagName !== 'TEXTAREA') { e.preventDefault(); saveModal(); }
    }
  });

  // ── Cleanup on dashboard close ────────────────────────────
  // All widgets registered by this session are removed from the desktop
  // when the dashboard window is closed.
  function setupCleanup() {
    try {
      const props = window.platform.getServiceSync('props');
      if (props?.onDestroy) {
        props.onDestroy(() => {
          activeWidgetRemovers.forEach(remove => { try { remove(); } catch (_) {} });
          activeWidgetRemovers.clear();
        });
      }
    } catch (_) {}
  }

  // ── Boot ──────────────────────────────────────────────────
  document.getElementById('search').style.display = '';
  document.getElementById('add-btn').style.display = 'none';
  setupCleanup();
  render();
</script>
</body>
</html>
